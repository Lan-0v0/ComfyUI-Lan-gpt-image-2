name: Publish to Comfy registry
on:
  workflow_dispatch:  # 允许手动触发
  push:
    branches:
      - main          # 当推送到 main 分支时触发
    paths:
      - "pyproject.toml"  # 仅当 pyproject.toml 文件发生变化时触发

jobs:
  publish-node:
    name: Publish Custom Node to registry
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史，用于版本标记
      - name: Publish Custom Node to Registry
        uses: Comfy-Org/publish-node-action@main  # 官方发布 Action[reference:19][reference:20]
        with:
          personal_access_token: ${{ secrets.REGISTRY_ACCESS_TOKEN }}  # 从 GitHub Secrets 读取令牌[reference:21]